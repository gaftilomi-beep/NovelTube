<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel Details - NovelTube</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div class="max-w-4xl mx-auto px-4 py-10">
        
        <div id="loading" class="text-center text-slate-500 font-medium py-20">
            Novel ki tafseelat load ho rahi hain... ⏳
        </div>

        <div id="novelContainer" class="hidden space-y-8">
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row gap-6 items-center md:items-start">
                <img id="novelCover" src="" alt="Cover" class="w-44 h-60 object-cover rounded-xl shadow-md border border-slate-100 flex-shrink-0">
                
                <div class="flex-1 text-center md:text-left space-y-3">
                    <h1 id="novelTitle" class="text-2xl md:text-3xl font-black text-slate-800"></h1>
                    <p id="novelDescription" class="text-sm text-slate-600 leading-relaxed"></p>
                    
                    <div id="singleSection" class="hidden flex flex-wrap gap-3 justify-center md:justify-start pt-2">
                        <a id="readOnlineBtn" href="#" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm px-6 py-3 rounded-xl transition shadow-md flex items-center gap-2">
                            Read Online 📖
                        </a>
                        <a id="downloadBtn" href="#" download target="_blank" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-sm px-6 py-3 rounded-xl transition shadow-md flex items-center gap-2">
                            Download Full Novel 📥
                        </a>
                    </div>
                </div>
            </div>

            <div id="chaptersSection" class="hidden space-y-4">
                <h2 class="text-lg font-black text-slate-800 flex items-center gap-2">
                    📚 Available Chapters
                </h2>
                <div id="chaptersList" class="grid gap-3 sm:grid-cols-2">
                    </div>
            </div>

        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const novelId = urlParams.get('novelId');

        async function fetchNovelDetails() {
            try {
                if (!novelId) {
                    document.getElementById('loading').innerHTML = "❌ Invalid Link! Novel ID missing.";
                    return;
                }

                const response = await fetch(`https://noveltube.onrender.com/api/novels/${novelId}`);
                if (!response.ok) throw new Error('Novel details load nahi ho sakeen');
                
                const novel = await response.json();

                // Inject basic info
                document.getElementById('novelCover').src = novel.coverUrl || 'https://via.placeholder.com/176x240';
                document.getElementById('novelTitle').innerText = novel.title;
                document.getElementById('novelDescription').innerText = novel.description || "Is novel ki koi description nahi hai.";
                document.title = `${novel.title} - NovelTube`;

                const chaptersSection = document.getElementById('chaptersSection');
                const singleSection = document.getElementById('singleSection');
                const chaptersList = document.getElementById('chaptersList');

                // Check standard conditions
                if (novel.hasChapters && novel.chapters && novel.chapters.length > 0) {
                    // Novel with chapters
                    singleSection.classList.add('hidden');
                    chaptersSection.classList.remove('hidden');

                    chaptersList.innerHTML = '';
                    novel.chapters.forEach(ch => {
                        const downloadLink = ch.chapterFile || '#'; 

                        chaptersList.innerHTML += `
                            <div class="flex items-center justify-between p-4 bg-white border border-slate-200 rounded-xl shadow-sm hover:border-indigo-100 transition">
                                <span class="text-sm font-bold text-slate-700">${ch.chapterTitle}</span>
                                <div class="flex items-center gap-2">
                                    <a href="reading-page.html?novelId=${novelId}&chapterId=${ch._id}" class="text-xs bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded-lg font-medium transition shadow-sm">
                                        Read 📖
                                    </a>
                                    <a href="${downloadLink}" download="${ch.chapterTitle}.pdf" target="_blank" class="text-xs bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-2 rounded-lg font-medium transition shadow-sm ${ch.chapterFile ? '' : 'hidden'}">
                                        📥 Download
                                    </a>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    // Single novel without chapters
                    chaptersSection.classList.add('hidden');
                    singleSection.classList.remove('hidden');

                    // FIX: Ab PDF open nahi hoga, balkay reading-page par redirect hoga!
                    document.getElementById('readOnlineBtn').href = `reading-page.html?novelId=${novelId}`;
                    document.getElementById('downloadBtn').href = novel.mainPdf || '#';
                }

                // Show main container
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('novelContainer').classList.remove('hidden');

            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerHTML = "❌ Data load karne mein masla aaya ya backend band hai.";
            }
        }

        window.onload = fetchNovelDetails;
    </script>
</body>
</html>
