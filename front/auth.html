<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NovelTube - Authentication Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .heading-font { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between selection:bg-indigo-500 selection:text-white">

    <header class="p-4 bg-white border-b border-slate-100 shadow-xs">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <a href="index.html" class="heading-font text-lg font-black tracking-tight text-indigo-600 flex items-center gap-1.5">
                <span>⚡</span> NovelTube
            </a>
            <a href="index.html" class="text-xs font-semibold text-slate-500 hover:text-indigo-600 transition">
                ← Back to Home
            </a>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white rounded-3xl border border-slate-100 shadow-xl shadow-slate-200/50 p-6 md:p-8 space-y-6">
            
            <div class="text-center space-y-1">
                <h1 id="authTitle" class="heading-font text-2xl font-black text-slate-900 tracking-tight">Create an Account</h1>
                <p id="authSubtitle" class="text-xs text-slate-500 font-medium">Join us today to get unlimited free novels & articles</p>
            </div>

            <div class="bg-slate-100 p-1 rounded-2xl flex relative z-10">
                <button onclick="toggleAuthMode('signup')" id="tabSignupBtn" class="w-1/2 py-2 text-xs font-bold rounded-xl transition-all duration-200 bg-white text-indigo-600 shadow-xs">
                    New User (Sign Up)
                </button>
                <button onclick="toggleAuthMode('login')" id="tabLoginBtn" class="w-1/2 py-2 text-xs font-bold rounded-xl transition-all duration-200 text-slate-500 hover:text-slate-800">
                    Old User (Login)
                </button>
            </div>

            <div id="statusAlert" class="hidden text-xs p-3.5 font-semibold rounded-xl text-center"></div>

            <form id="signupForm" class="space-y-4">
                <div class="space-y-1">
                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider">Full Name</label>
                    <input type="text" id="signupName" required placeholder="Enter your full name" class="w-full p-3 text-sm bg-slate-50 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition">
                </div>
                <div class="space-y-1">
                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider">Email Address</label>
                    <input type="email" id="signupEmail" required placeholder="name@example.com" class="w-full p-3 text-sm bg-slate-50 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition">
                </div>
                <div class="space-y-1">
                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider">Create Password</label>
                    <input type="password" id="signupPassword" required placeholder="••••••••" class="w-full p-3 text-sm bg-slate-50 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition">
                </div>
                <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-xl transition shadow-md shadow-indigo-600/10">
                    Register Account 🚀
                </button>
            </form>

            <form id="loginForm" class="space-y-4 hidden">
                <div class="space-y-1">
                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider">Registered Email</label>
                    <input type="email" id="loginEmail" required placeholder="name@example.com" class="w-full p-3 text-sm bg-slate-50 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition">
                </div>
                <div class="space-y-1">
                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider">Your Password</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••" class="w-full p-3 text-sm bg-slate-50 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition">
                </div>
                <div class="text-right">
                    <a href="#" class="text-[10px] font-bold text-indigo-500 hover:underline">Forgot Password?</a>
                </div>
                <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-xl transition shadow-md shadow-indigo-600/10">
                    Secure Login 🔐
                </button>
            </form>

        </div>
    </main>

    <footer class="py-4 text-center text-[11px] text-slate-400 font-medium bg-white border-t border-slate-100">
        &copy; 2026 NovelTube Gatekeeper Control. All rights reserved.
    </footer>

    <script>
        const API_BASE_URL = 'https://noveltube.onrender.com/api';

        // 🔄 Toggle Sign Up / Login Tabs Interface
        function toggleAuthMode(mode) {
            const title = document.getElementById('authTitle');
            const subtitle = document.getElementById('authSubtitle');
            const signupForm = document.getElementById('signupForm');
            const loginForm = document.getElementById('loginForm');
            const tabSignupBtn = document.getElementById('tabSignupBtn');
            const tabLoginBtn = document.getElementById('tabLoginBtn');
            const alertBox = document.getElementById('statusAlert');
            
            alertBox.classList.add('hidden'); // clear alerts

            if (mode === 'signup') {
                title.innerText = "Create an Account";
                subtitle.innerText = "Join us today to get unlimited free novels & articles";
                signupForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
                
                tabSignupBtn.className = "w-1/2 py-2 text-xs font-bold rounded-xl transition-all duration-200 bg-white text-indigo-600 shadow-xs";
                tabLoginBtn.className = "w-1/2 py-2 text-xs font-bold rounded-xl transition-all duration-200 text-slate-500 hover:text-slate-800";
            } else {
                title.innerText = "Welcome Back";
                subtitle.innerText = "Log in to your account to continue reading";
                signupForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                
                tabLoginBtn.className = "w-1/2 py-2 text-xs font-bold rounded-xl transition-all duration-200 bg-white text-indigo-600 shadow-xs";
                tabSignupBtn.className = "w-1/2 py-2 text-xs font-bold rounded-xl transition-all duration-200 text-slate-500 hover:text-slate-800";
            }
        }

        // Notification Alerts Controller
        function showAlert(msg, isSuccess = false) {
            const alertBox = document.getElementById('statusAlert');
            alertBox.classList.remove('hidden', 'bg-rose-50', 'text-rose-600', 'bg-emerald-50', 'text-emerald-600');
            alertBox.innerText = msg;
            if (isSuccess) {
                alertBox.classList.add('bg-emerald-50', 'text-emerald-600');
            } else {
                alertBox.classList.add('bg-rose-50', 'text-rose-600');
            }
        }

        // 📝 Sign Up Form Submit Event
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;

            try {
                const response = await fetch(`${API_BASE_URL}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await response.json();

                if (response.ok) {
                    showAlert("🎉 Account registered! Switching to login tab...", true);
                    setTimeout(() => {
                        toggleAuthMode('login');
                        document.getElementById('loginEmail').value = email;
                    }, 1500);
                } else {
                    showAlert(data.error || "Registration failed. Try again!");
                }
            } catch (error) {
                showAlert("🚨 Connection failure. Server standard error.");
            }
        });

        // 🔑 Login Form Submit Event
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userRole', data.user?.role || 'user');
                    
                    showAlert("🔓 Login secure! Forwarding dashboard page...", true);
                    
                    setTimeout(() => {
                        if (data.user?.role === 'admin') {
                            window.location.href = 'dashboar.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    }, 1200);
                } else {
                    showAlert(data.error || "Invalid username or password credentials.");
                }
            } catch (error) {
                showAlert("🚨 Network issue. Server backend offline.");
            }
        });

        // ⚡ Smart Mode Detection Parameter Check on Page Load
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const mode = urlParams.get('mode');
            if (mode === 'login') {
                toggleAuthMode('login'); // Agar url me ?mode=login ho toh direct login khule
            } else {
                toggleAuthMode('signup'); // Default new users ke liye signup khule
            }
        }
    </script>
</body>
</html>
