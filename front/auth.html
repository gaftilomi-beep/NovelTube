<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovelTube - Join Community</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f0c20 0%, #06040a 100%);
        }
    </style>
</head>
<body class="text-gray-200 min-h-screen flex items-center justify-center p-4">

    <div class="bg-[#130f26]/80 backdrop-blur-md border border-purple-900/40 p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500">
                NovelTube
            </h1>
            <p class="text-xs text-gray-400 mt-1">Read & Share Your Favorite Novels</p>
        </div>

        <div class="flex border-b border-gray-800 mb-6 text-center font-medium">
            <button id="tab-signup" onclick="switchTab('signup')" class="w-1/2 pb-3 border-b-2 border-purple-500 text-purple-400 cursor-pointer transition">Sign Up</button>
            <button id="tab-login" onclick="switchTab('login')" class="w-1/2 pb-3 border-b-2 border-transparent text-gray-400 hover:text-gray-200 cursor-pointer transition">Log In</button>
        </div>

        <div id="alert-box" class="hidden mb-4 p-3 rounded-lg text-sm text-center"></div>

        <form id="signup-form" onsubmit="handleAuth(event, 'signup')" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Username</label>
                <input type="text" id="signup-username" required class="w-full bg-[#090714] border border-gray-800 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-purple-500 transition" placeholder="Hamza_99">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Email Address</label>
                <input type="email" id="signup-email" required class="w-full bg-[#090714] border border-gray-800 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-purple-500 transition" placeholder="name@example.com">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Password</label>
                <input type="password" id="signup-password" required class="w-full bg-[#090714] border border-gray-800 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-purple-500 transition" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-semibold py-3 rounded-lg shadow-lg hover:shadow-purple-500/20 transition cursor-pointer">
                Create Account
            </button>
        </form>

        <form id="login-form" onsubmit="handleAuth(event, 'login')" class="space-y-4 hidden">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Email Address</label>
                <input type="email" id="login-email" required class="w-full bg-[#090714] border border-gray-800 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-purple-500 transition" placeholder="name@example.com">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-1">Password</label>
                <input type="password" id="login-password" required class="w-full bg-[#090714] border border-gray-800 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-purple-500 transition" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-semibold py-3 rounded-lg shadow-lg hover:shadow-purple-500/20 transition cursor-pointer">
                Welcome Back
            </button>
        </form>
    </div>

    <script>
        function switchTab(type) {
            const signupForm = document.getElementById('signup-form');
            const loginForm = document.getElementById('login-form');
            const tabSignup = document.getElementById('tab-signup');
            const tabLogin = document.getElementById('tab-login');
            const alertBox = document.getElementById('alert-box');
            
            alertBox.classList.add('hidden');

            if(type === 'signup') {
                signupForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
                tabSignup.className = "w-1/2 pb-3 border-b-2 border-purple-500 text-purple-400 cursor-pointer transition";
                tabLogin.className = "w-1/2 pb-3 border-b-2 border-transparent text-gray-400 hover:text-gray-200 cursor-pointer transition";
            } else {
                signupForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                tabLogin.className = "w-1/2 pb-3 border-b-2 border-purple-500 text-purple-400 cursor-pointer transition";
                tabSignup.className = "w-1/2 pb-3 border-b-2 border-transparent text-gray-400 hover:text-gray-200 cursor-pointer transition";
            }
        }

        async function handleAuth(event, type) {
            event.preventDefault();
            const alertBox = document.getElementById('alert-box');
            alertBox.classList.add('hidden');

            let bodyData = {};
            
            // 🎯 FIXED: Direct backend port 5001 connected smoothly
            let endpoint = type === 'signup' 
                ? 'https://noveltube.onrender.com/api/auth/signup' 
                : 'https://noveltube.onrender.com/api/auth/login';

            if (type === 'signup') {
                bodyData = {
                    username: document.getElementById('signup-username').value,
                    email: document.getElementById('signup-email').value,
                    password: document.getElementById('signup-password').value
                };
            } else {
                bodyData = {
                    email: document.getElementById('login-email').value,
                    password: document.getElementById('login-password').value
                };
            }

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });

                const data = await response.json();

                if (!response.ok) {
                    alertBox.textContent = data.error || "Kuch ghalat hua!";
                    alertBox.className = "mb-4 p-3 rounded-lg text-sm text-center bg-red-950/50 border border-red-900/50 text-red-400 block";
                } else {
                    alertBox.textContent = data.message;
                    alertBox.className = "mb-4 p-3 rounded-lg text-sm text-center bg-green-950/50 border border-green-900/50 text-green-400 block";
                    
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.username);

                    // 🎯 FIXED: Direct standard redirection to index.html for Live Server
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                }
            } catch (err) {
                alertBox.textContent = "Server down hai ya network error hai!";
                alertBox.className = "mb-4 p-3 rounded-lg text-sm text-center bg-red-950/50 border border-red-900/50 text-red-400 block";
            }
        }
    </script>
</body>
</html>
