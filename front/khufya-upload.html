<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Upload - NovelTube</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style>
        @font-face {
            font-family: 'Jameel Noori Nastaleeq';
            src: url('https://cdn.jsdelivr.net/gh/subbanyusuf/jameel-noori-nastaleeq@master/Jameel%20Noori%20Nastaleeq.ttf') format('truetype');
        }
        .font-urdu {
            font-family: 'Jameel Noori Nastaleeq', 'Urdu Typesetting', 'Jonameel Noori', serif;
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100 flex items-center justify-center p-4 md:p-8">

    <div class="w-full max-w-2xl bg-slate-800 p-6 md:p-8 rounded-2xl shadow-2xl border border-slate-700 space-y-6">
        
        <div class="text-center">
            <h2 id="pageMainHeading" class="text-2xl font-black tracking-tight text-indigo-400">📚 Content Management Studio</h2>
            <p class="text-xs text-slate-400 mt-1">Select karein ke aap Novel upload kar rahe hain ya Article</p>
        </div>

        <form id="masterUploadForm" class="space-y-5">
            
            <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700/60 grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase">Content Type</label>
                    <select id="contentType" class="w-full mt-1 p-2.5 bg-slate-900 border border-slate-700 rounded-xl text-sm focus:outline-none focus:border-indigo-500 text-slate-100 font-bold" onchange="handleTypeChange()">
                        <option value="novel">📚 Novel</option>
                        <option value="article">📰 Article</option>
                    </select>
                </div>
                <div>
                    <label id="categoryLabel" class="block text-xs font-bold text-slate-400 uppercase">Novel Category / Genre</label>
                    <div class="flex gap-2 mt-1">
                        <select id="categorySelect" required class="flex-1 p-2.5 bg-slate-900 border border-slate-700 rounded-xl text-sm focus:outline-none focus:border-indigo-500 text-slate-100">
                            </select>
                        <button type="button" onclick="addNewCategoryPrompt()" class="bg-indigo-600 hover:bg-indigo-500 px-3 rounded-xl text-xs font-bold transition">+</button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label id="titleLabel" class="block text-xs font-bold text-slate-400 uppercase">Novel Name</label>
                    <input type="text" id="title" required class="w-full mt-1 p-2.5 bg-slate-900 border border-slate-700 rounded-xl text-sm focus:outline-none focus:border-indigo-500 text-slate-100" placeholder="Enter title...">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase">Writer Name / Author</label>
                    <input type="text" id="author" required class="w-full mt-1 p-2.5 bg-slate-900 border border-slate-700 rounded-xl text-sm focus:outline-none focus:border-indigo-500 text-slate-100" placeholder="e.g., Nimra Ahmed">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase">Cover Image</label>
                    <input type="file" id="coverImage" required accept="image/*" class="w-full mt-1 bg-slate-900 border border-slate-700 rounded-xl p-2 text-xs text-slate-400 file:mr-3 file:py-1 file:px-2.5 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-950 file:text-indigo-400 hover:file:bg-indigo-900">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase">Status</label>
                    <select id="status" class="w-full mt-1 p-2.5 bg-slate-900 border border-slate-700 rounded-xl text-sm focus:outline-none focus:border-indigo-500 text-slate-100">
                        <option value="Ongoing">Ongoing (Jari Hai)</option>
                        <option value="Completed">Completed (Mukammal)</option>
                    </select>
                </div>
            </div>

            <div>
                <label id="descLabel" class="block text-xs font-bold text-slate-400 uppercase">Novel Short Description (Urdu Nastaleeq Output)</label>
                <textarea id="description" required rows="3" class="font-urdu text-xl w-full mt-1 p-3 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 text-slate-100 text-right" style="direction: rtl;" placeholder="یہاں کہانی کا خلاصہ لکھیں..."></textarea>
            </div>

            <div id="chapterControllerBox" class="bg-slate-900/40 p-4 rounded-xl border border-slate-700/50 space-y-4">
                <div>
                    <label id="hasChaptersLabel" class="block text-xs font-bold text-slate-400 uppercase">Kya is Novel ke Episodes / Chapters hain?</label>
                    <select id="hasChapters" class="w-full mt-1 p-2.5 bg-slate-900 border border-slate-700 rounded-xl text-sm focus:outline-none focus:border-indigo-500 text-slate-100" onchange="toggleUploadMode()">
                        <option value="no">Nahi (Aik hi Mukammal PDF File Hai)</option>
                        <option value="yes">Haan (Alag Alag Episodes List Hai)</option>
                    </select>
                </div>

                <div id="singleUploadBlock">
                    <label id="mainPdfLabel" class="block text-xs font-bold text-slate-400 uppercase">Upload Mukammal Novel PDF</label>
                    <input type="file" id="mainPdf" accept=".pdf" class="w-full mt-1 bg-slate-900 border border-slate-700 rounded-xl p-2 text-xs text-slate-400 file:mr-3 file:py-1 file:px-2.5 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-950 file:text-indigo-400 hover:file:bg-indigo-900">
                </div>

                <div id="multiChapterBlock" class="hidden space-y-3 border-t border-slate-700/50 pt-3">
                    <div class="text-xs font-bold text-indigo-400 uppercase tracking-wide">📦 Chapter Queue Generator</div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 bg-slate-900 p-3 rounded-xl border border-slate-700">
                        <div>
                            <label id="tempTitleLabel" class="block text-[11px] font-semibold text-slate-400 uppercase">Episode Name / Number</label>
                            <input type="text" id="tempChapterTitle" class="w-full mt-1 p-2 bg-slate-800 border border-slate-700 rounded-lg text-xs text-slate-100" placeholder="e.g., Episode 1">
                        </div>
                        <div>
                            <label class="block text-[11px] font-semibold text-slate-400 uppercase">Select Chapter PDF</label>
                            <input type="file" id="tempChapterFile" accept=".pdf" class="w-full mt-1 text-xs text-slate-400">
                        </div>
                        <div class="sm:col-span-2 flex justify-end">
                            <button type="button" onclick="addChapterToQueue()" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold px-4 py-2 rounded-lg transition">+ Queue Me Add Karein</button>
                        </div>
                    </div>

                    <div class="bg-slate-950/60 p-3 rounded-xl border border-slate-800 space-y-1 max-h-40 overflow-y-auto" id="queueContainer">
                        <p class="text-slate-500 text-xs italic text-center py-2">Koi chapter queue me nahi hai.</p>
                    </div>
                </div>
            </div>

            <button type="submit" id="submitMasterBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-4 rounded-xl text-sm transition tracking-wide shadow-lg shadow-indigo-950/50">
                🚀 Upload System Process Start Karein
            </button>
        </form>
    </div>

    <script>
        const API_BASE_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') 
            ? 'https://noveltube.onrender.com/api' 
            : '/api';

        let uploadedChaptersList = [];

        // Dynamic Text Adjustments for Novel vs Article
        function handleTypeChange() {
            const type = document.getElementById('contentType').value;
            const titleLabel = document.getElementById('titleLabel');
            const categoryLabel = document.getElementById('categoryLabel');
            const descLabel = document.getElementById('descLabel');
            const chapterControllerBox = document.getElementById('chapterControllerBox');
            const mainPdfLabel = document.getElementById('mainPdfLabel');
            const hasChaptersLabel = document.getElementById('hasChaptersLabel');
            const tempTitleLabel = document.getElementById('tempTitleLabel');

            if (type === 'article') {
                titleLabel.innerText = "Article Title";
                categoryLabel.innerText = "Article Category";
                descLabel.innerText = "Article Short Description (Urdu Nastaleeq Output)";
                mainPdfLabel.innerText = "Upload Article PDF File";
                hasChaptersLabel.innerText = "Kya is Article ke parts / sub-sections hain?";
                tempTitleLabel.innerText = "Section Name / Part Number";
                document.getElementById('title').placeholder = "Enter article title...";
            } else {
                titleLabel.innerText = "Novel Name";
                categoryLabel.innerText = "Novel Category / Genre";
                descLabel.innerText = "Novel Short Description (Urdu Nastaleeq Output)";
                mainPdfLabel.innerText = "Upload Mukammal Novel PDF";
                hasChaptersLabel.innerText = "Kya is Novel ke Episodes / Chapters hain?";
                tempTitleLabel.innerText = "Episode Name / Number";
                document.getElementById('title').placeholder = "Enter title...";
            }
        }

        // Toggle Upload Section Blocks
        function toggleUploadMode() {
            const choice = document.getElementById('hasChapters').value;
            if(choice === 'yes') {
                document.getElementById('multiChapterBlock').classList.remove('hidden');
                document.getElementById('singleUploadBlock').classList.add('hidden');
                document.getElementById('mainPdf').required = false;
            } else {
                document.getElementById('multiChapterBlock').classList.add('hidden');
                document.getElementById('singleUploadBlock').classList.remove('hidden');
                if(document.getElementById('hasChapters').offsetParent !== null) {
                    document.getElementById('mainPdf').required = true;
                }
            }
        }

        // Add item to temporary upload state queue array
        function addChapterToQueue() {
            const titleInput = document.getElementById('tempChapterTitle');
            const fileInput = document.getElementById('tempChapterFile');

            if(!titleInput.value || !fileInput.files[0]) {
                alert("Galti: Meharbani karke pehle Chapter Title aur PDF select karein!");
                return;
            }

            uploadedChaptersList.push({
                title: titleInput.value,
                file: fileInput.files[0]
            });

            titleInput.value = "";
            fileInput.value = "";
            renderQueueUI();
        }

        // Queue visual synchronized renderer
        function renderQueueUI() {
            const container = document.getElementById('queueContainer');
            if(uploadedChaptersList.length === 0) {
                container.innerHTML = `<p class="text-slate-500 text-xs italic text-center py-2">Koi chapter queue me nahi hai.</p>`;
                return;
            }

            container.innerHTML = uploadedChaptersList.map((ch, index) => `
                <div class="flex items-center justify-between text-xs bg-slate-900 p-2 rounded-lg border border-slate-800">
                    <span class="font-semibold text-slate-300 truncate max-w-[200px]">📍 ${ch.title}</span>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] bg-indigo-950 text-indigo-400 px-2 py-0.5 rounded border border-indigo-900">PDF Ready</span>
                        <button type="button" onclick="removeQueueItem(${index})" class="text-rose-400 hover:text-rose-500 font-bold px-1">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function removeQueueItem(index) {
            uploadedChaptersList.splice(index, 1);
            renderQueueUI();
        }

        // Load Categories Dynamically from MongoDB Atlas Server
        async function loadExistingCategories() {
            const select = document.getElementById('categorySelect');
            try {
                const response = await fetch(`${API_BASE_URL}/categories`);
                if (response.ok) {
                    const categories = await response.json();
                    if(categories.length > 0) {
                        select.innerHTML = categories.map(cat => `<option value="${cat.name}">${cat.name}</option>`).join('');
                    } else {
                        select.innerHTML = `<option value="General">General</option>`;
                    }
                }
            } catch (error) {
                console.error("Categories fetch error:", error);
                select.innerHTML = `<option value="General">General</option>`;
            }
        }

        // Add a brand new category on the fly via admin panel prompt module
        async function addNewCategoryPrompt() {
            const newCat = prompt("🆕 Nayi Category Ka Naam Likhein (e.g., Romantic, Horror, Tech):");
            if (!newCat || newCat.trim() === "") return;

            try {
                const response = await fetch(`${API_BASE_URL}/categories`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: newCat.trim() })
                });

                if (response.ok) {
                    alert(`🎉 Category "${newCat}" add ho gayi!`);
                    await loadExistingCategories();
                    document.getElementById('categorySelect').value = newCat.trim();
                } else {
                    alert("❌ Category add nahi ho saki ya pehle se majood hai.");
                }
            } catch (err) {
                alert("🚨 Backend operational failure error.");
            }
        }

        // Submit form data payload process stream
        document.getElementById('masterUploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const hasChaptersValue = document.getElementById('hasChapters').value;
            if (hasChaptersValue === 'yes' && uploadedChaptersList.length === 0) {
                alert("⚠️ Error: Aapne Multi-Chapter Mode select kiya hai par queue me koi chapter add nahi kiya!");
                return;
            }

            const submitBtn = document.getElementById('submitMasterBtn');
            const originalBtnText = submitBtn.innerText;
            submitBtn.disabled = true;
            submitBtn.innerText = "Files Compress Aur Upload Ho Rahi Hain... ⏳";

            const formData = new FormData();
            formData.append('contentType', document.getElementById('contentType').value); // Send Content Type
            formData.append('title', document.getElementById('title').value);
            formData.append('author', document.getElementById('author').value);
            formData.append('category', document.getElementById('categorySelect').value);
            formData.append('status', document.getElementById('status').value);
            formData.append('description', document.getElementById('description').value);
            formData.append('hasChapters', hasChaptersValue);

            const coverImageFile = document.getElementById('coverImage').files[0];
            formData.append('coverImage', coverImageFile);

            if (hasChaptersValue === 'no') {
                const mainPdfFile = document.getElementById('mainPdf').files[0];
                if(mainPdfFile) formData.append('mainPdf', mainPdfFile);
            } else {
                uploadedChaptersList.forEach((ch) => {
                    formData.append(`chapterTitles`, ch.title);
                    formData.append(`chapterFiles`, ch.file);
                });
            }

            try {
                const response = await fetch(`${API_BASE_URL}/novels`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    alert('🎉 Mubarak ho! Aapka content successfully platform par upload ho gaya!');
                    location.reload(); 
                } else {
                    const errData = await response.json();
                    alert('❌ Galti: ' + (errData.error || 'Upload nahi ho saka.'));
                }
            } catch (error) {
                console.error(error);
                alert('❌ Server se rabta nahi ho saka. Terminal check karein!');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = originalBtnText;
            }
        });

        window.onload = function() {
            loadExistingCategories();
            handleTypeChange();
        };
    </script>
</body>
</html>
