<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard & Analytics - NovelTube</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100 p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-6">
        
        <div class="flex flex-col sm:flex-row justify-between items-center bg-slate-800 p-6 rounded-2xl border border-slate-700 gap-4 shadow-xl">
            <div>
                <h1 class="text-2xl font-black text-indigo-400">🎛️ NovelTube Management Center</h1>
                <p class="text-xs text-slate-400 mt-0.5">Live Traffic, Views Tracker aur Book Studio Control</p>
            </div>
            <div class="flex space-x-3">
                <a href="index.html" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-xl text-xs font-bold transition">← Website Home</a>
                <a href="upload.html" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-lg shadow-indigo-600/30 transition">+ Upload Novel</a>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl flex items-center justify-between">
                <div>
                    <p class="text-sm text-slate-400 font-medium">Total Novels Uploaded</p>
                    <h2 id="totalNovelsCount" class="text-4xl font-black text-white mt-2">-</h2>
                </div>
                <div class="p-4 bg-indigo-600/10 text-indigo-400 rounded-xl text-2xl">📚</div>
            </div>

            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl flex items-center justify-between">
                <div>
                    <p class="text-sm text-slate-400 font-medium">Total Chapters Added</p>
                    <h2 id="totalChaptersCount" class="text-4xl font-black text-white mt-2">-</h2>
                </div>
                <div class="p-4 bg-emerald-600/10 text-emerald-400 rounded-xl text-2xl">📖</div>
            </div>
        </div>

        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl space-y-4">
            <div class="flex justify-between items-center border-b border-slate-700 pb-4">
                <div>
                    <h2 class="text-lg font-bold text-white">Your Book Studio</h2>
                    <p class="text-xs text-slate-400">Yahan se aap chapters add aur novels delete kar sakte hain</p>
                </div>
            </div>

            <div id="novelsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <p class="text-slate-400 text-sm">Novels load ho rahi hain...</p>
            </div>
        </div>

    </div>

    <div id="chapterModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center hidden p-4 z-50">
        <div class="bg-slate-800 border border-slate-700 w-full max-w-md p-6 rounded-2xl shadow-2xl relative space-y-4">
            <div class="flex justify-between items-center border-b border-slate-700 pb-3">
                <h3 class="text-base font-bold text-white">📖 Add New Chapter</h3>
                <button onclick="closeChapterModal()" class="text-slate-400 hover:text-white font-bold text-xl cursor-pointer">&times;</button>
            </div>
            
            <form id="addChapterForm" class="space-y-4">
                <input type="hidden" id="modalNovelId">

                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">Chapter Title (e.g., Chapter 1: The Beginning)</label>
                    <input type="text" id="nextChapterTitle" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 text-white">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">Select Chapter File (.txt or document)</label>
                    <input type="file" id="nextChapterFile" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs text-slate-400 file:mr-4 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-indigo-600/20 file:text-indigo-400 hover:file:bg-indigo-600/30 cursor-pointer">
                </div>

                <div class="flex space-x-3 pt-2">
                    <button type="button" onclick="closeChapterModal()" class="w-1/2 bg-slate-700 hover:bg-slate-600 text-white text-xs font-bold py-3 rounded-xl transition cursor-pointer">Cancel</button>
                    <button type="submit" id="modalSubmitBtn" class="w-1/2 bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold py-3 rounded-xl shadow-lg shadow-indigo-600/30 transition cursor-pointer">Save Chapter</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://noveltube.onrender.com/api';

        // 1. FETCH SYSTEM ANALYTICS
        function fetchSystemAnalytics() {
            fetch(`${API_BASE_URL}/analytics`)
                .then(res => {
                    if (!res.ok) throw new Error("Analytics route available nahi hai");
                    return res.json();
                })
                .then(data => {
                    document.getElementById('totalNovelsCount').innerText = data.totalNovels || 0;
                    document.getElementById('totalChaptersCount').innerText = data.totalChapters || 0;
                })
                .catch(err => {
                    console.log("Analytics Fallback:", err.message);
                    // Agar backend par route na ho toh safe fallback lagayein taaki page chalta rahe
                    document.getElementById('totalNovelsCount').innerText = "-";
                    document.getElementById('totalChaptersCount').innerText = "-";
                });
        }

        // 2. LOAD ADMIN DASHBOARD (NOVELS LIST)
        function loadAdminDashboard() {
            fetch(`${API_BASE_URL}/novels`)
                .then(res => {
                    if (!res.ok) throw new Error(`Server status: ${res.status}`);
                    return res.json();
                })
                .then(novels => {
                    const container = document.getElementById('novelsContainer');
                    container.innerHTML = '';

                    if (!novels || novels.length === 0) {
                        container.innerHTML = `<p class="text-slate-400 text-sm col-span-full text-center py-4">Koi novel upload nahi hui abhi tak.</p>`;
                        return;
                    }

                    novels.forEach(novel => {
                        // Agar image localhost ki ho toh usay render live domain par badal dein
                        let coverUrl = novel.coverImage;
                        if (coverUrl && coverUrl.includes('http://localhost:5001')) {
                            coverUrl = coverUrl.replace('http://localhost:5001', 'https://noveltube.onrender.com');
                        }

                        const card = document.createElement('div');
                        card.className = "bg-slate-800 p-4 rounded-xl border border-slate-700 flex flex-col justify-between gap-4 shadow-md";
                        card.innerHTML = `
                            <div class="flex gap-4">
                                <img src="${coverUrl || 'https://placehold.co/80x120'}" class="w-16 h-24 object-cover rounded-lg bg-slate-700 shadow">
                                <div class="flex-1 min-w-0">
                                    <h3 class="font-bold text-white text-sm truncate">${novel.title}</h3>
                                    <p class="text-xs text-slate-400 mt-1 line-clamp-2">${novel.description || 'No description provided.'}</p>
                                    <p class="text-[10px] text-indigo-400 font-mono mt-2 bg-indigo-950/40 inline-block px-2 py-0.5 rounded border border-indigo-900/50">Chapters: ${novel.chapters ? novel.chapters.length : 0}</p>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-2 text-center text-xs font-bold">
                                <button onclick="openChapterModal('${novel._id}')" class="bg-indigo-600/20 text-indigo-400 hover:bg-indigo-600 hover:text-white p-2 rounded-lg transition cursor-pointer">+ Add Chap</button>
                                <button onclick="deleteNovel('${novel._id}')" class="bg-rose-600/20 text-rose-400 hover:bg-rose-600 hover:text-white p-2 rounded-lg transition cursor-pointer">🗑️ Delete</button>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                })
                .catch(err => {
                    console.error("Dashboard Load Error:", err);
                    document.getElementById('novelsContainer').innerHTML = `
                        <p class="text-rose-400 text-sm col-span-full text-center py-4">
                            ❌ Data load nahi ho saka. (Backend live hone mein thoda time le sakta hai).
                        </p>`;
                });
        }

        // 3. DELETE NOVEL FUNCTION
        function deleteNovel(id) {
            if (confirm("Kya aap waqai yeh novel delete karna chahte hain?")) {
                fetch(`${API_BASE_URL}/novels/${id}`, {
                    method: 'DELETE'
                })
                .then(res => {
                    if (res.ok) {
                        alert("🎉 Novel kamyabi se delete ho gayi!");
                        initDashboard();
                    } else {
                        alert("❌ Delete karne mein koi masla aya.");
                    }
                })
                .catch(err => {
                    console.error("Delete Request Error:", err);
                    alert("Server tak request nahi pohnchi.");
                });
            }
        }

        // 4. MODAL CONTROLS
        function openChapterModal(id) {
            document.getElementById('modalNovelId').value = id;
            document.getElementById('chapterModal').classList.remove('hidden');
        }
        function closeChapterModal() {
            document.getElementById('chapterModal').classList.add('hidden');
            document.getElementById('addChapterForm').reset();
        }

        // 5. SUBMIT NEXT CHAPTER FORM SUBMISSION
        document.getElementById('addChapterForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const id = document.getElementById('modalNovelId').value;
            const submitBtn = document.getElementById('modalSubmitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "Uploading...";

            const formData = new FormData();
            formData.append('chapterTitle', document.getElementById('nextChapterTitle').value);
            formData.append('chapterFile', document.getElementById('nextChapterFile').files[0]);

            try {
                const response = await fetch(`${API_BASE_URL}/novels/${id}/add-chapter`, { 
                    method: 'POST', 
                    body: formData 
                });
                if (response.ok) {
                    alert("🎉 Chapter Added Successfully!");
                    closeChapterModal();
                    initDashboard();
                } else {
                    alert("❌ Chapter upload nahi ho saka. Server error.");
                }
            } catch (error) { 
                console.error("Upload failed:", error);
                alert("Upload failed. Network checks karein."); 
            } finally { 
                submitBtn.disabled = false; 
                submitBtn.innerText = "Save Chapter";
            }
        });

        // Combined Initializer
        function initDashboard() {
            fetchSystemAnalytics();
            loadAdminDashboard();
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
