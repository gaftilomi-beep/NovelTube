<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to NovelTube - Sign In</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        @keyframes float-slow {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-30px) scale(1.1); }
        }
        @keyframes float-reverse {
            0%, 100% { transform: translateY(0px) scale(1.1); }
            50% { transform: translateY(25px) scale(0.9); }
        }
        .animate-float-1 { animation: float-slow 8s infinite ease-in-out; }
        .animate-float-2 { animation: float-reverse 10s infinite ease-in-out; }
    </style>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4 relative overflow-hidden select-none">

    <div class="absolute inset-0 z-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-indigo-600/20 blur-[120px] animate-float-1"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[45vw] h-[45vw] rounded-full bg-emerald-500/10 blur-[100px] animate-float-2"></div>
    </div>

    <div class="w-full max-w-md bg-slate-900/60 backdrop-blur-xl p-8 rounded-3xl border border-slate-800 shadow-[0_0_50px_rgba(99,102,241,0.1)] z-10">
        
        <div class="text-center space-y-2 mb-8">
            <div class="inline-flex p-3 bg-gradient-to-tr from-indigo-600 to-violet-500 rounded-2xl shadow-lg">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-black tracking-tight bg-gradient-to-r from-white via-slate-200 to-indigo-400 bg-clip-text text-transparent">Welcome Reader</h1>
            <p class="text-xs text-slate-400 font-medium">Enter your details to access premium novels 🌌</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div class="space-y-1.5 relative group">
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500">📧</span>
                    <input type="email" id="email" required autocomplete="off" placeholder="name@example.com"
                           class="w-full pl-10 pr-4 py-3 bg-slate-950/60 border border-slate-800 rounded-xl text-sm text-white focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 font-medium transition-all">
                </div>
            </div>

            <div class="space-y-1.5 relative group mt-4">
                <div class="flex justify-between items-center">
                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider">Password</label>
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500">🔒</span>
                    <input type="password" id="password" required placeholder="••••••••"
                           class="w-full pl-10 pr-10 py-3 bg-slate-950/60 border border-slate-800 rounded-xl text-sm text-white focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 font-medium transition-all">
                    <button type="button" onclick="togglePasswordVisibility()" class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-500 hover:text-slate-300 cursor-pointer">👁️</button>
                </div>
            </div>

            <button type="submit" id="loginBtn" class="w-full relative mt-4 overflow-hidden bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-black py-3.5 px-4 rounded-xl text-sm shadow-xl transition-all cursor-pointer">
                <span class="relative z-10 flex items-center justify-center gap-2">Let's Read Premium Novels 🚀</span>
            </button>
        </form>
    </div>

    <script>
        function togglePasswordVisibility() {
            const passInput = document.getElementById('password');
            passInput.type = passInput.type === 'password' ? 'text' : 'password';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');

            loginBtn.disabled = true;
            loginBtn.innerText = "Verifying Credentials... 🪐";

            setTimeout(() => {
                if (email.includes('@') && password.length >= 4) {
                    alert("🎉 Login Successful! Welcome back.");
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userEmail', email);
                    window.location.href = "index.html";
                } else {
                    alert("❌ Galti! Sahi format mein email aur password enter karein.");
                    loginBtn.disabled = false;
                    loginBtn.innerText = "Let's Read Premium Novels 🚀";
                }
            }, 1500); 
        });
    </script>
</body>
</html>
